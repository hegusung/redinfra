- name: Download OpenVPN Server install script
  git:
    repo: 'https://github.com/angristan/openvpn-install.git'
    dest: '/opt/openvpn-install'
    version: 'master'  # Optional: Specify the branch or tag (default is "master")
    force: no  # Optional: Forcefully updates the repository if it already exists
    update: no  # Ensures the repository is updated if it already exists

- name: Set openvpn install script
  command: chmod +x /opt/openvpn-install/openvpn-install.sh

- name: Install OpenVPN Server
  command: /opt/openvpn-install/openvpn-install.sh install
  environment:
    AUTO_INSTALL: "y"

- name: "60 seconds sleep"
  ansible.builtin.pause:
    seconds: 60

- name: "Waiting for tun0 to be up"
  shell: "ip addr show tun0"
  register: tun0_check
  until: tun0_check.rc == 0
  retries: 30
  delay: 10
  failed_when: tun0_check.rc != 0
  changed_when: false

- name: Stop OpenVPN service
  service:
    name: openvpn-server@server
    state: stopped

- name: Wait for openvpn to stop
  wait_for:
    path: /var/run/openvpn-server/server.pid
    state: absent
    timeout: 30
  ignore_errors: yes

- name: Change IP range
  command: sed -i 's/10.8.0.0/{{ base_vpn_ip }}/' /etc/openvpn/server/server.conf

- name: Change dev tup to dev tap
  command: sed -i 's/dev tun/dev tap/' /etc/openvpn/server/server.conf

- name: Change UDP to TCP
  command: sed -i 's/proto udp/proto tcp/' /etc/openvpn/server/server.conf

- name: Disable gateway and permit client to client
  command: sed -i 's/push "redirect-gateway def1 bypass-dhcp"/client-to-client/' /etc/openvpn/server/server.conf

- name: Start OpenVPN service
  service:
    name: openvpn-server@server
    state: started  
